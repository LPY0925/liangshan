<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生态产品价值实现路径 — 四区透明分层</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --warm-white: #f8f3ea;
    --warm-white-deep: #efe5d6;
    --ink: #24362d;
    --muted-ink: #657468;
    --accent: #8a9f63;
    --accent-deep: #5d7649;
    --gold: #b39558;
  }

  body {
    background: var(--warm-white);
    color: var(--ink);
    font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
    overflow-x: hidden;
  }

  /* ── 滚动驱动动画区 ── */
  .animation-wrapper {
    position: relative;
    height: 220vh;
  }
  .sticky-container {
    position: sticky;
    top: 0;
    width: 100%;
    height: 100vh;
    overflow: hidden;
  }
  .sticky-bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 50% 34%, rgba(255, 252, 245, 0.94) 0%, rgba(248, 243, 234, 0.94) 48%, rgba(239, 229, 214, 0.96) 100%),
      linear-gradient(180deg, #fffaf2 0%, var(--warm-white) 100%);
  }

  /* — 滚动提示 — */
  .scroll-hint {
    position: absolute;
    bottom: 36px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 999;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    transition: opacity 0.6s;
  }
  .scroll-hint span {
    font-size: 13px;
    letter-spacing: 3px;
    color: rgba(77, 93, 72, 0.68);
  }
  .scroll-hint .arrow-down {
    width: 24px;
    height: 24px;
    border-right: 2px solid rgba(93, 118, 73, 0.46);
    border-bottom: 2px solid rgba(93, 118, 73, 0.46);
    transform: rotate(45deg);
    animation: bounceDown 2s ease-in-out infinite;
  }
  @keyframes bounceDown {
    0%, 100% { transform: rotate(45deg) translateY(0); opacity: 0.4; }
    50% { transform: rotate(45deg) translateY(8px); opacity: 1; }
  }

  /* — 四张分层图 — */
  .layer {
    position: absolute;
    overflow: hidden;
    border: 1px solid transparent;
    border-radius: 2px;
    will-change: left, top, width, height, filter, opacity, transform;
    backface-visibility: hidden;
  }
  .sticky-container.is-interactive .layer {
    cursor: pointer;
    box-shadow: 0 18px 38px rgba(79, 89, 62, 0.13);
    transition:
      opacity 0.32s ease,
      filter 0.32s ease,
      border-color 0.28s ease,
      box-shadow 0.28s ease,
      transform 0.28s ease;
  }
  .sticky-container.has-selection .layer {
    transition:
      left 0.72s cubic-bezier(.2,.82,.2,1),
      top 0.72s cubic-bezier(.2,.82,.2,1),
      width 0.72s cubic-bezier(.2,.82,.2,1),
      height 0.72s cubic-bezier(.2,.82,.2,1),
      opacity 0.56s ease,
      filter 0.56s ease,
      border-color 0.28s ease,
      box-shadow 0.28s ease,
      transform 0.28s ease;
  }
  .sticky-container.is-interactive .layer:hover,
  .sticky-container.is-interactive .layer:focus-visible {
    border-color: rgba(179, 149, 88, 0.7);
    box-shadow: 0 22px 48px rgba(93, 118, 73, 0.2);
    outline: none;
    transform: translateY(-5px);
  }
  .sticky-container.is-interactive .layer.is-selected {
    border-color: rgba(179, 149, 88, 0.82);
    box-shadow: 0 24px 58px rgba(93, 118, 73, 0.25);
    transform: none;
  }
  .sticky-container.is-interactive .layer.is-dimmed:hover {
    opacity: 0.16 !important;
  }
  .layer img {
    position: absolute;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    max-width: none;
    object-fit: fill;
    display: block;
    will-change: left, top, width, height;
  }

  /* — 标签 — */
  .layer-label {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
    font-weight: 600;
    letter-spacing: 2px;
    color: #43584b;
    text-shadow: 0 5px 22px rgba(93, 118, 73, 0.18);
    z-index: 80;
    will-change: left, top, opacity, font-size;
  }

  /* — 分隔线（展开后出现） — */
  .sep-line {
    position: absolute;
    top: 0;
    transform: none;
    width: 1px;
    background: linear-gradient(0deg, transparent, rgba(141, 159, 99, 0.36), transparent);
    will-change: opacity;
    opacity: 0;
  }

  /* — 点击后的对应文案 — */
  .path-copy {
    position: absolute;
    z-index: 90;
    width: min(520px, calc(100vw - 40px));
    height: auto;
    max-height: min(76vh, 680px);
    overflow-y: auto;
    padding: 24px 26px 26px 28px;
    border: 1px solid rgba(179, 149, 88, 0.24);
    border-left: 3px solid rgba(179, 149, 88, 0.58);
    border-radius: 6px;
    background: rgba(255, 252, 245, 0.88);
    box-shadow: 0 22px 58px rgba(93, 118, 73, 0.14);
    backdrop-filter: blur(12px);
    color: var(--ink);
    opacity: 0;
    pointer-events: none;
    transform: translateY(10px);
    transition:
      left 0.72s cubic-bezier(.2,.82,.2,1),
      top 0.72s cubic-bezier(.2,.82,.2,1),
      width 0.72s cubic-bezier(.2,.82,.2,1),
      height 0.72s cubic-bezier(.2,.82,.2,1),
      opacity 0.42s ease,
      transform 0.42s ease;
  }
  .path-copy.is-visible {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0);
  }
  .sticky-container.has-selection .path-copy {
    transition: none;
  }
  .path-back {
    position: sticky;
    top: 0;
    z-index: 1;
    display: flex;
    width: max-content;
    align-items: center;
    gap: 6px;
    margin: 0 0 16px auto;
    padding: 7px 11px;
    border: 1px solid rgba(93, 118, 73, 0.22);
    border-radius: 999px;
    background: rgba(255, 252, 245, 0.9);
    color: var(--accent-deep);
    font: inherit;
    font-size: 13px;
    font-weight: 700;
    line-height: 1;
    letter-spacing: 1px;
    cursor: pointer;
    box-shadow: 0 8px 18px rgba(93, 118, 73, 0.09);
    transition: background 0.22s ease, border-color 0.22s ease, transform 0.22s ease;
  }
  .path-back:hover,
  .path-back:focus-visible {
    border-color: rgba(93, 118, 73, 0.42);
    background: rgba(248, 243, 234, 0.98);
    outline: none;
    transform: translateY(-1px);
  }
  .path-copy .path-kicker {
    display: block;
    margin-bottom: 10px;
    color: var(--accent-deep);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 4px;
  }
  .path-copy h2 {
    margin-bottom: 18px;
    color: var(--ink);
    font-size: clamp(24px, 2.4vw, 38px);
    font-weight: 800;
    line-height: 1.18;
    letter-spacing: 1px;
  }
  .path-copy p {
    margin-top: 14px;
    color: #35473b;
    font-size: clamp(15px, 1.05vw, 18px);
    line-height: 1.92;
    letter-spacing: 0.4px;
  }
  .path-copy .path-emphasis {
    color: #526d45;
    font-weight: 800;
  }

  /* ── 底部信息 ── */
  .footer-section {
    display: none;
    min-height: 0;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
  }
  .footer-card {
    text-align: center;
    max-width: 800px;
  }
  .footer-card h2 {
    font-size: 26px;
    font-weight: 300;
    letter-spacing: 4px;
    color: var(--accent-deep);
    margin-bottom: 14px;
  }
  .footer-card p {
    font-size: 14px;
    color: var(--muted-ink);
    line-height: 1.8;
    letter-spacing: 1px;
  }

  /* ── 响应式 ── */
  @media (max-width: 768px) {
    .layer-label { letter-spacing: 1px; }
    .scroll-hint span { font-size: 12px; }
    .animation-wrapper { height: 200vh; }
    .path-copy {
      padding: 18px 18px 20px;
      border-left-width: 1px;
      text-align: left;
    }
    .path-back { margin: 0 0 14px auto; }
    .path-copy h2 { font-size: 23px; }
    .path-copy p { font-size: 14px; line-height: 1.76; }
  }
</style>
</head>
<body>

<!-- ======== 滚动动画区 ======== -->
<section class="animation-wrapper" id="animWrapper">
  <div class="sticky-container" id="stickyContainer">
    <div class="sticky-bg"></div>

    <!-- 滚动提示 -->
    <div class="scroll-hint" id="scrollHint">
      <span>向下滚动探索</span>
      <div class="arrow-down"></div>
    </div>

    <!-- 分隔线们 -->
    <div class="sep-line" id="sep1"></div>
    <div class="sep-line" id="sep2"></div>
    <div class="sep-line" id="sep3"></div>

    <!-- 图层1：碳权交易 → 生态权益交易 -->
    <div class="layer" id="layer1">
      <img src="../images/tanquan.png" alt="碳权交易分层">
    </div>

    <!-- 图层2：生态产业 → 生态产业化经营 -->
    <div class="layer" id="layer2">
      <img src="../images/chanye.png" alt="生态产业分层">
    </div>

    <!-- 图层3：生态补偿 → 生态补偿 -->
    <div class="layer" id="layer3">
      <img src="../images/buchang.png" alt="生态补偿分层">
    </div>

    <!-- 图层4：生态金融 → 生态金融 -->
    <div class="layer" id="layer4">
      <img src="../images/jinrong.png" alt="生态金融分层">
    </div>

    <span class="layer-label" id="label1">生态权益交易</span>
    <span class="layer-label" id="label2">生态产业化经营</span>
    <span class="layer-label" id="label3">生态补偿</span>
    <span class="layer-label" id="label4">生态金融</span>

    <article class="path-copy" id="pathCopy" aria-live="polite"></article>
  </div>
</section>

<!-- ======== 底部 ======== -->
<section class="footer-section">
  <div class="footer-card">
    <h2>生态产品价值实现路径</h2>
    <p>生态权益交易 · 生态产业化经营 · 生态补偿 · 生态金融<br>四轮驱动，协同推进生态文明建设</p>
  </div>
</section>

<script>
(function () {
  var wrapper = document.getElementById('animWrapper');
  var sticky = document.getElementById('stickyContainer');
  var hint = document.getElementById('scrollHint');
  var copyPanel = document.getElementById('pathCopy');

  var layers = [
    { el: document.getElementById('layer1'), label: document.getElementById('label1'), title: '生态权益交易' },
    { el: document.getElementById('layer2'), label: document.getElementById('label2'), title: '生态产业化经营' },
    { el: document.getElementById('layer3'), label: document.getElementById('label3'), title: '生态补偿' },
    { el: document.getElementById('layer4'), label: document.getElementById('label4'), title: '生态金融' },
  ];

  var seps = [
    document.getElementById('sep1'),
    document.getElementById('sep2'),
    document.getElementById('sep3'),
  ];

  var sourceW = 1672;
  var sourceH = 941;
  var segmentCount = 4;
  var segmentW = sourceW / segmentCount;
  var sourceAspect = sourceW / sourceH;
  var segmentAspect = segmentW / sourceH;

  var wrapperHeight = 0;
  var viewH = 0;
  var ticking = false;
  var selectedIndex = null;
  var lastProgress = 0;
  var readyProgress = 0.96;

  var pathTexts = [
    {
      kicker: '第一条路',
      title: '生态权益交易',
      paragraphs: [
        '你把碳排放指标省下来，可以卖。你把森林的碳汇算出来，可以卖。你把污染物排放权节约下来，可以卖。这不是想象，这是真实的市场。到二〇二三年底，全国碳市场累计成交碳排放配额超过两亿吨，累计成交额超过一百四十亿元。碳不再只是一种气体——它是一种可以被持有、被交易、被定价的资产。空气有了价格，不是因为空气变贵了，而是因为干净的空气变少了。当一个东西变少的时候，人们才想起给它标价。这个逻辑很残酷，但它很真实。',
        '在经济学里，稀缺产生价格。在生态学里，价格产生珍惜。这两句话连在一起，才是一个完整的道理。'
      ],
      emphasisIndex: 1
    },
    {
      kicker: '第二条路',
      title: '生态产业化经营',
      paragraphs: [
        '好山好水可以变成旅游路线。好空气可以变成康养产业。好生态可以变成农产品的金字招牌。浙江丽水的“丽水山耕”品牌，把绿水青山的优势做进了农产品的价格里——同样的大米、同样的茶叶、同样的山笋，因为产地生态好，溢价超过百分之三十。消费者愿意为生态付费——不是因为他们有环保意识，而是因为好东西就是好东西。生态好不只是好看，它让东西更好吃、更好住、更好玩。生态的价值，在这里变成了货架上的价格标签。'
      ],
      emphasisIndex: -1
    },
    {
      kicker: '第三条路',
      title: '生态补偿',
      paragraphs: [
        '上游保护了水源，下游受益了。那么下游是不是应该为这份保护付钱？新安江是中国第一个跨省流域生态补偿试点——浙江和安徽之间，一条江的上下游，用数据说了算：水质达标了，下游的浙江向安徽支付补偿；水质不达标，安徽向浙江反补。从二〇一二年到二〇二四年，累计补偿资金超过七十亿元。这不是施舍，这是一条江上下游的居民达成的共识——你的绿水青山保护得好，我值得为它买单。因为你保护的不仅是你的水，也是我的水。'
      ],
      emphasisIndex: -1
    },
    {
      kicker: '第四条路',
      title: '生态金融',
      paragraphs: [
        '生态本身可以作为一种资产去融资。浙江丽水在全国率先试行“生态资产融资”，以GEP核算价值为基础发放绿色贷款。一座山的生态价值不再只是一个存在于报告里的数字——它可以变成银行账户里的钱，可以用于生态修复投资，可以产生收益再反哺到保护中去。钱从青山绿水里面长出来，又回到青山绿水里面去。这不是循环经济，这是生态经济——自然的回报率，有时候比任何理财产品都高。'
      ],
      emphasisIndex: -1
    }
  ];

  function recalc() {
    viewH = window.innerHeight;
    wrapperHeight = wrapper.offsetHeight;
  }

  function clamp(v, min, max) {
    return v < min ? min : (v > max ? max : v);
  }

  function easeInOutCubic(t) {
    return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3)/2;
  }

  function easeOutCubic(t) {
    return 1 - Math.pow(1 - t, 3);
  }

  function renderCopy(index) {
    var item = pathTexts[index];
    copyPanel.innerHTML = '';

    var backButton = document.createElement('button');
    backButton.className = 'path-back';
    backButton.type = 'button';
    backButton.textContent = '← 返回';
    backButton.addEventListener('click', clearSelection);
    copyPanel.appendChild(backButton);

    var kicker = document.createElement('span');
    kicker.className = 'path-kicker';
    kicker.textContent = item.kicker;
    copyPanel.appendChild(kicker);

    var title = document.createElement('h2');
    title.textContent = item.title;
    copyPanel.appendChild(title);

    item.paragraphs.forEach(function (text, paragraphIndex) {
      var p = document.createElement('p');
      p.textContent = text;
      if (paragraphIndex === item.emphasisIndex) {
        p.className = 'path-emphasis';
      }
      copyPanel.appendChild(p);
    });
  }

  function clearSelection() {
    selectedIndex = null;
    copyPanel.classList.remove('is-visible');
    requestAnimationFrame(update);
  }

  function setSelected(index) {
    if (lastProgress < readyProgress) { return; }
    if (selectedIndex === index) {
      clearSelection();
      return;
    }
    selectedIndex = index;
    renderCopy(selectedIndex);
    requestAnimationFrame(update);
  }

  function update() {
    ticking = false;
    var scrollY = window.scrollY;

    // progress: 0 (叠加全屏) → 1 (水平展开)
    var rawP = scrollY / (wrapperHeight - viewH);
    var progress = clamp(rawP, 0, 1);
    lastProgress = progress;

    var containerW = sticky.clientWidth || sticky.offsetWidth;
    var containerH = sticky.clientHeight || sticky.offsetHeight;
    var cx = containerW / 2;
    var cy = containerH / 2;

    // -- 初始全屏尺寸：按 cover 方式铺满整个视口 --
    var initW = Math.max(containerW, containerH * sourceAspect);
    var initH = Math.max(containerH, containerW / sourceAspect);
    var initLeft = (containerW - initW) / 2;
    var initTop = (containerH - initH) / 2;

    // -- 最终单图尺寸：裁出源图的 1/4 竖向内容，保持截图中的大图比例 --
    var isCompact = containerW < 768;
    var sideMargin = isCompact ? 16 : clamp(containerW * 0.072, 60, 150);
    var panelGap = isCompact ? clamp(containerW * 0.035, 10, 24) : clamp(containerW * 0.057, 70, 120);
    var basePanelH = isCompact ? clamp(containerH * 0.46, 150, 360) : clamp(containerH * 0.735, 520, 780);
    var maxPanelHByWidth = (containerW - sideMargin * 2 - panelGap * 3) / (segmentAspect * segmentCount);
    var finalH = Math.max(Math.min(basePanelH, maxPanelHByWidth), Math.min(maxPanelHByWidth, 120));
    var finalW = finalH * segmentAspect;

    // 动画完成度：展开完成时正好到页面底部
    var animP = progress;
    var t = easeInOutCubic(animP);
    var isInteractive = progress >= readyProgress;
    var hasSelection = isInteractive && selectedIndex !== null;
    sticky.classList.toggle('is-interactive', isInteractive);

    if (!isInteractive && selectedIndex !== null) {
      selectedIndex = null;
      copyPanel.classList.remove('is-visible');
      hasSelection = false;
    }
    sticky.classList.toggle('has-selection', hasSelection);

    var totalFinalW = finalW * segmentCount + panelGap * (segmentCount - 1);
    var startX = (containerW - totalFinalW) / 2 + finalW / 2;
    var finalXs = [
      startX,
      startX + finalW + panelGap,
      startX + (finalW + panelGap) * 2,
      startX + (finalW + panelGap) * 3,
    ];

    // 所有图同一行，Y 始终在中心
    var finalY = cy;
    var currentPanelRects = [];
    var selectedH = isCompact ? clamp(containerH * 0.34, 155, 290) : finalH;
    var selectedW = selectedH * segmentAspect;
    var copyW = isCompact ? Math.min(containerW - 40, 520) : clamp(containerW * 0.32, 390, 560);
    var detailGap = isCompact ? 24 : clamp(containerW * 0.035, 42, 72);
    var groupW = isCompact ? selectedW : selectedW + detailGap + copyW;
    var selectedLeft = isCompact ? (cx - selectedW / 2) : (cx - groupW / 2);
    var selectedTop = isCompact ? clamp(containerH * 0.08, 44, 78) : (cy - selectedH / 2);
    var copyLeft = isCompact ? ((containerW - copyW) / 2) : (selectedLeft + selectedW + detailGap);

    layers.forEach(function (layer, i) {
      var fx = finalXs[i];
      var finalLeft = fx - finalW / 2;
      var finalTop = finalY - finalH / 2;
      var targetLeft = finalLeft;
      var targetTop = finalTop;
      var targetW = finalW;
      var targetH = finalH;

      if (hasSelection && i === selectedIndex) {
        targetLeft = selectedLeft;
        targetTop = selectedTop;
        targetW = selectedW;
        targetH = selectedH;
      }

      var curLeft = initLeft + (targetLeft - initLeft) * t;
      var curTop = initTop + (targetTop - initTop) * t;
      var curW = initW + (targetW - initW) * t;
      var curH = initH + (targetH - initH) * t;

      currentPanelRects.push({
        left: curLeft,
        top: curTop,
        width: curW,
        height: curH,
        centerX: curLeft + curW / 2,
      });

      layer.el.style.left = curLeft + 'px';
      layer.el.style.top  = curTop + 'px';
      layer.el.style.width  = curW + 'px';
      layer.el.style.height = curH + 'px';

      var segmentScale = targetH / sourceH;
      var finalImgW = sourceW * segmentScale;
      var finalImgH = targetH;
      var finalImgLeft = -segmentW * i * segmentScale;
      var img = layer.el.querySelector('img');
      img.style.left = (finalImgLeft * t) + 'px';
      img.style.top = '0px';
      img.style.width = (initW + (finalImgW - initW) * t) + 'px';
      img.style.height = (initH + (finalImgH - initH) * t) + 'px';

      // z-index: 初始叠加时按序, 展开后平级
      layer.el.style.zIndex = hasSelection && i === selectedIndex ? 75 : Math.round(20 - i * 4 * (1 - t));
      layer.el.classList.toggle('is-selected', hasSelection && i === selectedIndex);
      layer.el.classList.toggle('is-dimmed', hasSelection && i !== selectedIndex);
      layer.el.setAttribute('aria-pressed', hasSelection && i === selectedIndex ? 'true' : 'false');

      // 标签
      var labelGap = clamp(18 + curH * 0.018, 16, 32);
      var labelSize = clamp(15 + t * 6, 15, 22);
      layer.label.style.left = (curLeft + curW / 2) + 'px';
      layer.label.style.top = (curTop + curH + labelGap) + 'px';
      layer.label.style.fontSize = labelSize + 'px';

      // 标签淡入（后半段出现）
      var labelAlpha = clamp((animP - 0.35) / 0.35, 0, 1);
      var labelOpacity = easeOutCubic(labelAlpha);
      if (hasSelection && i !== selectedIndex) {
        labelOpacity = 0;
      } else if (hasSelection) {
        labelOpacity = 0.82;
      }
      layer.label.style.opacity = labelOpacity;

      // 图片发光（展开后减弱）
      var glow = 32 * (1 - t) + 4;
      if (hasSelection && i !== selectedIndex) {
        layer.el.style.opacity = '0.06';
        layer.el.style.filter = 'grayscale(0.24) saturate(0.6) blur(0.4px) drop-shadow(0 0 2px rgba(93,118,73,0.05))';
      } else if (hasSelection) {
        layer.el.style.opacity = '1';
        layer.el.style.filter = 'drop-shadow(0 24px 52px rgba(93,118,73,0.24))';
      } else {
        layer.el.style.opacity = '1';
        layer.el.style.filter = 'drop-shadow(0 0 ' + glow + 'px rgba(93,118,73,' + (0.18*(1-t)+0.1) + '))';
      }
    });

    if (hasSelection) {
      var copyH = isCompact ? Math.max(containerH - selectedTop - selectedH - 82, 180) : selectedH;
      copyPanel.style.width = copyW + 'px';
      copyPanel.style.height = copyH + 'px';
      copyPanel.style.left = copyLeft + 'px';
      copyPanel.style.maxHeight = copyH + 'px';

      var copyTop = isCompact
        ? selectedTop + selectedH + 42
        : selectedTop;
      copyPanel.style.top = copyTop + 'px';
      copyPanel.classList.add('is-visible');
    } else {
      copyPanel.style.height = 'auto';
      copyPanel.style.maxHeight = 'min(76vh, 680px)';
      copyPanel.style.left = cx + 'px';
      copyPanel.style.top = cy + 'px';
      copyPanel.classList.remove('is-visible');
    }

    // 分隔线（出现在图与图之间）
    seps.forEach(function (sep, i) {
      // 分隔线位于相邻两图之间
      var leftX = currentPanelRects[i].centerX;
      var rightX = currentPanelRects[i + 1].centerX;
      var sepX = (leftX + rightX) / 2;
      var sepHeight = clamp(currentPanelRects[i].height * 0.82, 90, containerH * 0.78);

      sep.style.left = sepX + 'px';
      sep.style.height = sepHeight + 'px';
      sep.style.top = (cy - sepHeight / 2) + 'px';

      var sepAlpha = hasSelection ? 0 : clamp((animP - 0.4) / 0.3, 0, 0.45);
      sep.style.opacity = easeOutCubic(sepAlpha);
    });

    // 滚动提示渐隐
    if (progress > 0.08) {
      hint.style.opacity = Math.max(0, 1 - progress / 0.2);
    } else {
      hint.style.opacity = 1;
    }
  }

  function onScroll() {
    if (!ticking) {
      ticking = true;
      requestAnimationFrame(update);
    }
  }

  function onResize() {
    recalc();
    update();
  }

  recalc();
  update();

  layers.forEach(function (layer, i) {
    layer.el.setAttribute('role', 'button');
    layer.el.setAttribute('tabindex', '0');
    layer.el.setAttribute('aria-label', '查看' + layer.title + '路径说明');
    layer.el.setAttribute('aria-pressed', 'false');
    layer.el.addEventListener('click', function () {
      setSelected(i);
    });
    layer.el.addEventListener('keydown', function (event) {
      if (event.key === 'Enter' || event.key === ' ') {
        event.preventDefault();
        setSelected(i);
      }
    });
  });

  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onResize);

  // 用 IO 在可见时校准
  var io = new IntersectionObserver(function (entries) {
    entries.forEach(function (e) {
      if (e.isIntersecting) { recalc(); update(); }
    });
  }, { threshold: [0, 0.2, 0.5, 0.8] });
  io.observe(wrapper);
})();
</script>
</body>
</html>
